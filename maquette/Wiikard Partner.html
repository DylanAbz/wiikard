<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiikard · Espace Partenaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #E2DED8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    .phone-shell {
      width: 390px;
      height: 844px;
      background: #F9F8F6;
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.08),
        0 40px 80px rgba(0,0,0,0.28),
        0 16px 32px rgba(0,0,0,0.12);
    }

    .status-bar {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: #F9F8F6;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }
    .status-time { font-size: 15px; font-weight: 600; color: #0D0D0D; letter-spacing: -0.3px; }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    .screen-area {
      position: absolute;
      top: 50px;
      left: 0; right: 0;
      bottom: 84px;
      overflow: hidden;
    }

    .tab-screen {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background: #F9F8F6;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.26s cubic-bezier(0.4,0,0.2,1), transform 0.26s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }
    .tab-screen.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .tab-screen::-webkit-scrollbar { display: none; }

    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 84px;
      background: rgba(249,248,246,0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.07);
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding: 10px 32px 0;
      z-index: 20;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-icon-wrap {
      width: 52px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      transition: background 0.2s;
    }
    .nav-item.active .nav-icon-wrap { background: rgba(255,79,48,0.1); }
    .nav-label {
      font-size: 10px;
      font-weight: 500;
      color: #A0998F;
      letter-spacing: 0.1px;
      transition: color 0.2s;
    }
    .nav-item.active .nav-label { color: #FF4F30; }

    /* Camera viewfinder */
    .viewfinder {
      background: #141414;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      aspect-ratio: 1;
    }
    /* Scanning line animation */
    @keyframes scanLine {
      0%   { top: 15%; opacity: 1; }
      48%  { top: 82%; opacity: 1; }
      50%  { top: 82%; opacity: 0; }
      52%  { top: 15%; opacity: 0; }
      54%  { top: 15%; opacity: 1; }
      100% { top: 15%; }
    }
    .scan-line {
      position: absolute;
      left: 12%; right: 12%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #FF4F30, transparent);
      animation: scanLine 2.4s ease-in-out infinite;
      border-radius: 1px;
    }

    /* Corner targets */
    .corners { position: absolute; inset: 0; pointer-events: none; }
    .corner {
      position: absolute;
      width: 28px; height: 28px;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 2px;
    }
    .corner::before { width: 3px; height: 100%; }
    .corner::after  { width: 100%; height: 3px; }
    .corner.tl { top: 18%; left: 12%; }
    .corner.tr { top: 18%; right: 12%; transform: scaleX(-1); }
    .corner.bl { bottom: 18%; left: 12%; transform: scaleY(-1); }
    .corner.br { bottom: 18%; right: 12%; transform: scale(-1); }

    /* Camera grain overlay */
    .viewfinder::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      opacity: 0.4;
      pointer-events: none;
    }

    /* Success card */
    @keyframes popIn {
      0%   { transform: scale(0.88); opacity: 0; }
      60%  { transform: scale(1.03); }
      100% { transform: scale(1); opacity: 1; }
    }
    .success-card { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    @keyframes checkDraw {
      from { stroke-dashoffset: 60; }
      to   { stroke-dashoffset: 0; }
    }
    .check-path {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: checkDraw 0.5s 0.15s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    /* Pulse ring */
    @keyframes pulseRing {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .pulse-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 3px solid #22c55e;
      animation: pulseRing 1.4s ease-out infinite;
    }
    .pulse-ring-2 {
      animation-delay: 0.7s;
    }

    /* KPI card */
    .kpi-card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    /* History row */
    .hist-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #F0EEE9;
    }
    .hist-row:last-child { border-bottom: none; }

    /* Dot pulse (waiting state indicator) */
    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1; transform: scale(1); }
    }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #FF4F30; }
    .dot:nth-child(1) { animation: dotPulse 1.2s ease-in-out 0s infinite; }
    .dot:nth-child(2) { animation: dotPulse 1.2s ease-in-out 0.2s infinite; }
    .dot:nth-child(3) { animation: dotPulse 1.2s ease-in-out 0.4s infinite; }

    button { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Icon helper ── */
function Icon({ name, size = 20, color = "#0D0D0D", strokeWidth = 1.8 }) {
  const containerRef = useRef(null);
  useEffect(() => {
    const el = containerRef.current;
    if (!el || !window.lucide) return;
    el.innerHTML = '';
    const icons = window.lucide;
    const key = name.replace(/-([a-z])/g, (_, l) => l.toUpperCase());
    const def = icons[key];
    if (!def) return;
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.setAttribute('viewBox','0 0 24 24');
    svg.setAttribute('fill','none');
    svg.setAttribute('stroke', color);
    svg.setAttribute('stroke-width', strokeWidth);
    svg.setAttribute('stroke-linecap','round');
    svg.setAttribute('stroke-linejoin','round');
    svg.innerHTML = def[2].map(([tag, attrs]) => {
      const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
      Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
      return e.outerHTML;
    }).join('');
    el.appendChild(svg);
  }, [name, size, color, strokeWidth]);
  return <span ref={containerRef} style={{ display:'inline-flex', alignItems:'center', justifyContent:'center' }}></span>;
}

/* ── Animated check ── */
function AnimatedCheck({ size = 80 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 80 80" fill="none">
      <circle cx="40" cy="40" r="38" fill="#dcfce7" />
      <circle cx="40" cy="40" r="30" fill="#22c55e" />
      <polyline
        className="check-path"
        points="26,40 36,52 56,30"
        fill="none"
        stroke="white"
        strokeWidth="4.5"
        strokeLinecap="round"
        strokeLinejoin="round"
      />
    </svg>
  );
}

/* ══════════════════════════════════
   SCREEN 1 — SCANNER
══════════════════════════════════ */
function ScannerScreen() {
  const [scanned, setScanned] = useState(false);
  const [scanning, setScanning] = useState(false);

  function handleScan() {
    setScanning(true);
    setTimeout(() => {
      setScanning(false);
      setScanned(true);
    }, 1200);
  }

  function handleReset() {
    setScanned(false);
  }

  return (
    <div style={{ padding:'16px 24px 24px', height:'100%', display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
        <div>
          <p style={{ fontSize:12, color:'#A0998F', fontWeight:500, letterSpacing:'0.5px', textTransform:'uppercase', marginBottom:2 }}>Espace Partenaire</p>
          <h2 style={{ fontSize:22, fontWeight:700, color:'#0D0D0D', letterSpacing:'-0.4px' }}>Scanner</h2>
        </div>
        <div style={{
          width:40, height:40, borderRadius:12,
          background:'white', boxShadow:'0 2px 8px rgba(0,0,0,0.08)',
          display:'flex', alignItems:'center', justifyContent:'center'
        }}>
          <Icon name="Bell" size={18} color="#6B645C" strokeWidth={1.8} />
        </div>
      </div>

      {/* Main zone */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:16 }}>
        {!scanned ? (
          <>
            {/* Viewfinder */}
            <div className="viewfinder" style={{ flex:1, maxHeight:320 }}>
              {/* Subtle grid */}
              <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity:0.06 }}>
                <defs>
                  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
                    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="white" strokeWidth="0.5"/>
                  </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />
              </svg>

              {/* Corner targets */}
              <div className="corners">
                <div className="corner tl"></div>
                <div className="corner tr"></div>
                <div className="corner bl"></div>
                <div className="corner br"></div>
              </div>

              {/* Scan line — only when not scanning simulation */}
              {!scanning && <div className="scan-line"></div>}

              {/* Scanning overlay */}
              {scanning && (
                <div style={{
                  position:'absolute', inset:0, display:'flex', flexDirection:'column',
                  alignItems:'center', justifyContent:'center', gap:12,
                  background:'rgba(0,0,0,0.6)'
                }}>
                  <div style={{ display:'flex', gap:8 }}>
                    <span className="dot"></span>
                    <span className="dot"></span>
                    <span className="dot"></span>
                  </div>
                  <p style={{ fontSize:13, color:'rgba(255,255,255,0.7)', fontWeight:500 }}>Lecture en cours…</p>
                </div>
              )}

              {/* Center label */}
              {!scanning && (
                <div style={{
                  position:'absolute', bottom:16, left:0, right:0,
                  display:'flex', justifyContent:'center'
                }}>
                  <div style={{
                    background:'rgba(255,255,255,0.1)',
                    backdropFilter:'blur(8px)',
                    borderRadius:20, padding:'6px 16px',
                    border:'1px solid rgba(255,255,255,0.12)'
                  }}>
                    <p style={{ fontSize:12, color:'rgba(255,255,255,0.75)', fontWeight:500, letterSpacing:'0.3px' }}>Pointez la caméra vers le QR code</p>
                  </div>
                </div>
              )}
            </div>

            {/* Status */}
            <div style={{
              display:'flex', alignItems:'center', justifyContent:'center', gap:8
            }}>
              <div style={{ width:8, height:8, borderRadius:'50%', background:'#FF4F30', boxShadow:'0 0 0 3px rgba(255,79,48,0.2)' }}></div>
              <p style={{ fontSize:14, color:'#6B645C', fontWeight:500 }}>Prêt à scanner</p>
            </div>

            {/* CTA */}
            <button
              onClick={handleScan}
              disabled={scanning}
              style={{
                width:'100%', padding:'17px', borderRadius:16,
                background: scanning ? '#D0CCC5' : '#FF4F30',
                color:'white', fontSize:16, fontWeight:700,
                border:'none', cursor: scanning ? 'not-allowed' : 'pointer',
                letterSpacing:'-0.2px',
                boxShadow: scanning ? 'none' : '0 8px 24px rgba(255,79,48,0.32)',
                transition:'all 0.2s',
                display:'flex', alignItems:'center', justifyContent:'center', gap:8
              }}>
              <Icon name="Scan" size={20} color="white" strokeWidth={2.2} />
              Simuler un scan
            </button>
          </>
        ) : (
          /* ── ÉTAT 2 : VALIDÉ ── */
          <div className="success-card" style={{ flex:1, display:'flex', flexDirection:'column', gap:16 }}>
            {/* Success card */}
            <div style={{
              flex:1, background:'#f0fdf4',
              borderRadius:24, border:'2px solid #bbf7d0',
              display:'flex', flexDirection:'column',
              alignItems:'center', justifyContent:'center',
              gap:16, padding:'32px 24px',
              position:'relative', overflow:'hidden'
            }}>
              {/* BG decoration */}
              <div style={{
                position:'absolute', top:-60, right:-60,
                width:200, height:200, borderRadius:'50%',
                background:'rgba(34,197,94,0.08)', pointerEvents:'none'
              }}></div>

              {/* Check icon with pulse */}
              <div style={{ position:'relative' }}>
                <div className="pulse-ring"></div>
                <div className="pulse-ring pulse-ring-2"></div>
                <AnimatedCheck size={88} />
              </div>

              {/* CARTE VALIDE */}
              <div style={{ textAlign:'center' }}>
                <p style={{ fontSize:11, color:'#16a34a', fontWeight:600, letterSpacing:'2px', textTransform:'uppercase', marginBottom:4 }}>Wiikard</p>
                <h1 style={{ fontSize:34, fontWeight:800, color:'#15803d', letterSpacing:'-1px', lineHeight:1 }}>CARTE VALIDE</h1>
              </div>

              {/* Divider */}
              <div style={{ width:48, height:2, background:'#bbf7d0', borderRadius:1 }}></div>

              {/* Member info */}
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
                <div style={{
                  width:56, height:56, borderRadius:'50%',
                  background:'linear-gradient(135deg, #34d399, #059669)',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  boxShadow:'0 6px 20px rgba(34,197,94,0.3)',
                  fontSize:22, fontWeight:700, color:'white'
                }}>T</div>
                <div style={{ textAlign:'center' }}>
                  <p style={{ fontSize:20, fontWeight:700, color:'#15803d', letterSpacing:'-0.3px' }}>Thomas</p>
                  <p style={{ fontSize:12, color:'#4ade80', fontWeight:500 }}>Membre Actif · WK-29471</p>
                </div>
              </div>

              {/* Discount badge */}
              <div style={{
                background:'#15803d', borderRadius:12,
                padding:'10px 24px', display:'flex', alignItems:'center', gap:8
              }}>
                <Icon name="Tag" size={16} color="white" strokeWidth={2} />
                <span style={{ fontSize:15, fontWeight:700, color:'white' }}>−15 % à appliquer</span>
              </div>
            </div>

            {/* New scan button */}
            <button
              onClick={handleReset}
              style={{
                width:'100%', padding:'17px', borderRadius:16,
                background:'#0D0D0D',
                color:'white', fontSize:16, fontWeight:700,
                border:'none', cursor:'pointer',
                letterSpacing:'-0.2px',
                boxShadow:'0 8px 24px rgba(0,0,0,0.18)',
                display:'flex', alignItems:'center', justifyContent:'center', gap:8
              }}>
              <Icon name="RotateCcw" size={18} color="white" strokeWidth={2.2} />
              Nouveau scan
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   SCREEN 2 — STATISTIQUES
══════════════════════════════════ */
function StatsScreen() {
  const passages = [
    { time:'12h42', name:'Thomas', valid:true },
    { time:'12h28', name:'Sophie', valid:true },
    { time:'12h09', name:'Marc',   valid:true },
    { time:'11h53', name:'Clara',  valid:false },
    { time:'11h41', name:'Léo',    valid:true },
  ];

  return (
    <div style={{ padding:'16px 24px 32px' }}>
      {/* Header */}
      <div style={{ marginBottom:22 }}>
        <p style={{ fontSize:12, color:'#A0998F', fontWeight:500, letterSpacing:'0.5px', textTransform:'uppercase', marginBottom:2 }}>Tableau de bord</p>
        <h2 style={{ fontSize:22, fontWeight:700, color:'#0D0D0D', letterSpacing:'-0.4px', marginBottom:2 }}>Mon Activité</h2>
        <p style={{ fontSize:13, color:'#A0998F', fontWeight:500 }}>Le Bouchon Grenoblois</p>
      </div>

      {/* Big KPI */}
      <div className="kpi-card" style={{ padding:'22px 24px', marginBottom:12, position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:-30, right:-20, width:120, height:120, borderRadius:'50%', background:'rgba(255,79,48,0.06)' }}></div>
        <p style={{ fontSize:12, color:'#A0998F', fontWeight:500, letterSpacing:'1px', textTransform:'uppercase', marginBottom:6 }}>Scans aujourd'hui</p>
        <div style={{ display:'flex', alignItems:'flex-end', gap:6, marginBottom:8 }}>
          <span style={{ fontSize:56, fontWeight:800, color:'#0D0D0D', letterSpacing:'-3px', lineHeight:1 }}>42</span>
          <div style={{ display:'flex', alignItems:'center', gap:4, paddingBottom:8 }}>
            <Icon name="TrendingUp" size={14} color="#22c55e" strokeWidth={2.5} />
            <span style={{ fontSize:12, color:'#22c55e', fontWeight:600 }}>+12 vs hier</span>
          </div>
        </div>
        {/* Mini bar chart */}
        <div style={{ display:'flex', alignItems:'flex-end', gap:3, height:32 }}>
          {[18,24,30,22,35,42].map((v,i) => (
            <div key={i} style={{ flex:1, display:'flex', alignItems:'flex-end' }}>
              <div style={{
                width:'100%',
                height: (v/42)*32,
                borderRadius:'3px 3px 0 0',
                background: i===5 ? '#FF4F30' : '#F0EEE9',
                transition:'height 0.3s'
              }}></div>
            </div>
          ))}
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', marginTop:3 }}>
          {['Lu','Ma','Me','Je','Ve','Auj'].map(d => (
            <span key={d} style={{ fontSize:9, color:'#C0B8AF', fontWeight:500, flex:1, textAlign:'center' }}>{d}</span>
          ))}
        </div>
      </div>

      {/* 2-col KPIs */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20 }}>
        <div className="kpi-card" style={{ padding:'16px' }}>
          <div style={{ width:34, height:34, borderRadius:10, background:'rgba(34,197,94,0.1)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:10 }}>
            <Icon name="ShieldCheck" size={17} color="#22c55e" strokeWidth={2} />
          </div>
          <p style={{ fontSize:24, fontWeight:800, color:'#0D0D0D', letterSpacing:'-0.8px', marginBottom:2 }}>98<span style={{ fontSize:14, fontWeight:600 }}>%</span></p>
          <p style={{ fontSize:11, color:'#A0998F', fontWeight:500, lineHeight:1.3 }}>Taux de validité</p>
        </div>
        <div className="kpi-card" style={{ padding:'16px' }}>
          <div style={{ width:34, height:34, borderRadius:10, background:'rgba(255,79,48,0.08)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:10 }}>
            <Icon name="Clock" size={17} color="#FF4F30" strokeWidth={2} />
          </div>
          <p style={{ fontSize:24, fontWeight:800, color:'#0D0D0D', letterSpacing:'-0.8px', marginBottom:2 }}>12<span style={{ fontSize:14, fontWeight:600 }}>h30</span></p>
          <p style={{ fontSize:11, color:'#A0998F', fontWeight:500, lineHeight:1.3 }}>Pic d'affluence</p>
        </div>
      </div>

      {/* Last passages */}
      <div className="kpi-card" style={{ padding:'4px 16px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 0 4px' }}>
          <p style={{ fontSize:13, fontWeight:600, color:'#0D0D0D' }}>Derniers passages</p>
          <span style={{ fontSize:11, color:'#FF4F30', fontWeight:600 }}>Voir tout</span>
        </div>
        {passages.map((p,i) => (
          <div key={i} className="hist-row">
            <div style={{
              width:36, height:36, borderRadius:10, flexShrink:0,
              background: p.valid ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.08)',
              display:'flex', alignItems:'center', justifyContent:'center'
            }}>
              <Icon name={p.valid ? 'CheckCircle' : 'XCircle'} size={17} color={p.valid ? '#22c55e' : '#ef4444'} strokeWidth={2} />
            </div>
            <div style={{ flex:1 }}>
              <p style={{ fontSize:13, fontWeight:600, color:'#0D0D0D', marginBottom:1 }}>{p.name}</p>
              <p style={{ fontSize:11, color:'#A0998F' }}>{p.time}</p>
            </div>
            <div style={{
              background: p.valid ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.08)',
              borderRadius:8, padding:'3px 9px'
            }}>
              <span style={{ fontSize:11, fontWeight:600, color: p.valid ? '#16a34a' : '#ef4444' }}>
                {p.valid ? 'Validé' : 'Refusé'}
              </span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Status bar ── */

  return (
    <svg width="25" height="12" viewBox="0 0 25 12" fill="none">

      <path d="M23 4v4a2 2 0 0 0 0-4z" fill="#0D0D0D" fillOpacity="0.4"/>

  );
}
